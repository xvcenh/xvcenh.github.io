title: "项目问题库"
email: team@xvcenh.com
description: "团队项目开发问题与解决方案知识库"
baseurl: ""
url: "https://xvcenh.github.io"
author: "xvcenh团队"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

# 分页设置
paginate: 12
paginate_path: "/page:num/"

# 自定义变量
project_name: "项目问题库"

# 分类设置
categories:
  - name: 硬件
    color: "#2563eb"
  - name: 软件
    color: "#10b981"
  - name: 数据库
    color: "#7c3aed"
  - name: 部署
    color: "#dc2626"
  - name: 工具
    color: "#d97706"

# 导航菜单
navigation:
  - name: 首页
    url: /
  - name: 问题列表
    url: /issues/
  - name: 分类浏览
    url: /categories/
  - name: 搜索
    url: /search/
  - name: 关于
    url: /about/